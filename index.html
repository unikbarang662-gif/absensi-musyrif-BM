<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Musyrif - Sistem Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- Firebase SDK - Menghubungkan ke Cloud Storage & Database -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'absensi-musyrif-pro';

        // Global Firebase Tools untuk diakses script biasa
        window.db = db;
        window.appId = appId;
        window.collection = collection;
        window.addDoc = addDoc;
        window.deleteDoc = deleteDoc;
        window.doc = doc;
        window.onSnapshot = onSnapshot;

        // Auto-Login dengan Retry System yang diperkuat
        const initAuth = async () => {
            const delays = [1000, 2000, 4000, 8000];
            for (let i = 0; i < delays.length; i++) {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                    console.log("Autentikasi Firebase Berhasil");
                    return;
                } catch (error) {
                    console.warn(`Percobaan login ${i+1} gagal:`, error.message);
                    if (i === delays.length - 1) {
                        document.getElementById('loading-overlay').style.display = 'none';
                        notify("Gagal terhubung ke server. Periksa koneksi internet Anda.");
                    } else {
                        await new Promise(r => setTimeout(r, delays[i]));
                    }
                }
            }
        };

        // Jalankan Autentikasi
        initAuth();

        // Pantau Perubahan Status Auth
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                // Jika sudah di dalam dashboard, mulai sinkronisasi
                if (document.getElementById('main-app').style.display === 'block' && window.startSync) {
                    window.startSync();
                }
            }
        });
    </script>

    <style>
        :root { --primary:#2e7d32; --primary-light:#4caf50; --bg:#f5f7f5; --card:#fff; --text:#1b1b1b; --text-light:#616161; --border:#e0e0e0; --danger:#d32f2f; --success:#388e3c; --warning:#f57c00; --info:#1976d2; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 16px; min-height: 100vh; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-light)); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 25px; border-radius: 16px; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .login-tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; cursor: pointer; font-weight: 600; color: var(--text-light); transition: 0.3s; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; outline: none; }
        .form-group input:focus { border-color: var(--primary); }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: 0.2s; margin-top: 5px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #1b5e20; }
        .btn-wa { background: #25D366; color: white; margin-top: 10px; text-decoration: none; display: flex; align-items: center; justify-content: center; }
        .btn-danger { background: var(--danger); color: white; }

        #main-app { display: none; max-width: 900px; margin: 0 auto; padding-bottom: 50px; }
        header { text-align: center; margin-bottom: 20px; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; }
        .logout-btn { position: absolute; top: 10px; right: 10px; background: #eee; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 4px solid var(--primary); }
        .card h2 { font-size: 1.1rem; margin-bottom: 15px; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        
        .stats-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-box { background: #f9f9f9; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
        .stat-box .val { font-size: 1.5rem; font-weight: bold; color: var(--primary); }
        .stat-box .label { font-size: 0.8rem; color: var(--text-light); }

        .history-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .history-table th { background: #f1f1f1; padding: 12px; text-align: left; font-size: 0.85rem; }
        .history-table td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .photo-preview { width: 45px; height: 45px; object-fit: cover; border-radius: 6px; cursor: pointer; }

        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #ddd; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #img-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10001; justify-content: center; align-items: center; padding: 20px; }
        #img-modal img { max-width: 100%; max-height: 80vh; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-weight: 600;">Menghubungkan ke Cloud...</p>
    </div>

    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-box">
            <h2 style="text-align: center; margin-bottom: 20px; color: var(--primary);">Absensi Musyrif Online</h2>
            <div class="login-tabs">
                <button id="tab-m" class="tab-btn active" onclick="setRole('musyrif')">👤 Musyrif</button>
                <button id="tab-a" class="tab-btn" onclick="setRole('admin')">🛡️ Admin</button>
            </div>
            
            <div id="form-musyrif">
                <div class="form-group">
                    <label>Asrama</label>
                    <select id="login-asrama" onchange="loadMusyrifNames()">
                        <option value="">-- Pilih Asrama --</option>
                        <option value="al-hakim">Asrama Al Hakim</option>
                        <option value="al-fattah">Asrama Al Fattah</option>
                        <option value="al-karim">Asrama Al Karim</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nama Musyrif</label>
                    <select id="login-nama" disabled>
                        <option value="">Pilih asrama dahulu...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-pass" placeholder="Masukkan password">
                </div>
                <button class="btn btn-primary" onclick="doLogin()">Masuk Sekarang</button>
                <a href="https://wa.me/6285893588373" class="btn btn-wa" target="_blank">💬 Hubungi Admin</a>
            </div>

            <div id="form-admin" style="display: none;">
                <div class="form-group">
                    <label>PIN Admin</label>
                    <input type="password" id="login-pin" placeholder="Masukkan 4 digit PIN">
                </div>
                <button class="btn btn-primary" onclick="doLoginAdmin()">Masuk Admin</button>
            </div>
        </div>
    </div>

    <!-- Dashboard Main -->
    <div id="main-app">
        <header>
            <button class="logout-btn" onclick="location.reload()">Keluar</button>
            <h1 id="header-title">Dashboard</h1>
            <p id="header-user" style="color: var(--text-light); font-size: 0.9rem;"></p>
        </header>

        <!-- Tampilan Musyrif -->
        <div id="musyrif-view">
            <div class="card">
                <h2>📝 Input Absensi</h2>
                <div class="form-group">
                    <label>Kegiatan Saat Ini</label>
                    <select id="abs-kegiatan">
                        <option value="Membangunkan Santri">Membangunkan Santri (Subuh)</option>
                        <option value="Pengajian Ba'da Subuh">Pengajian Ba'da Subuh</option>
                        <option value="Gobraki Sekolah">Berangkat Sekolah Formal</option>
                        <option value="Gobraki Maghrib">Persiapan Maghrib & Piket</option>
                        <option value="Pendampingan Jam Muthola'ah">Pendampingan Muthola'ah</option>
                        <option value="Menertibkan Jam Tidur">Menertibkan Jam Tidur</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Ambil Foto (Wajib Kamera Depan)</label>
                    <input type="file" id="abs-foto" accept="image/*" capture="user">
                </div>
                <button class="btn btn-primary" id="btn-submit" onclick="submitAbsen()">✅ Kirim Absensi</button>
            </div>

            <div class="card">
                <h2>📊 Ringkasan Kehadiran</h2>
                <div class="stats-summary">
                    <div class="stat-box"><div class="val" id="st-total">0</div><div class="label">Total Absen</div></div>
                    <div class="stat-box"><div class="val" id="st-today">0</div><div class="label">Hari Ini</div></div>
                </div>
            </div>

            <div class="card">
                <h2>📜 Riwayat Terakhir</h2>
                <div style="overflow-x: auto;">
                    <table class="history-table">
                        <thead><tr><th>Waktu</th><th>Kegiatan</th><th>Foto</th></tr></thead>
                        <tbody id="my-history"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Tampilan Admin -->
        <div id="admin-view" style="display: none;">
            <div class="card">
                <h2>⚙️ Panel Admin</h2>
                <button class="btn btn-primary" onclick="exportData()">📄 Download Laporan PDF</button>
            </div>
            <div class="card">
                <h2>📊 Data Seluruh Musyrif</h2>
                <div style="overflow-x: auto;">
                    <table class="history-table">
                        <thead><tr><th>Waktu</th><th>Nama</th><th>Asrama</th><th>Kegiatan</th><th>Foto</th><th>Aksi</th></tr></thead>
                        <tbody id="admin-table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Foto Modal -->
    <div id="img-modal" onclick="this.style.display='none'"><img id="modal-img" src=""></div>

    <script>
        const DATA_MUSYRIF = {
            "al-hakim": ["Ali Mashuri", "Ali Zahid", "Reva Dwi", "Imam Syafi'i"],
            "al-fattah": ["Fattahilah", "Brian Adi Waskito", "Babil Yasar", "Fahmi", "Wawan Febi"],
            "al-karim": ["Bima Julian", "Irfan Khoirul Aziz", "Rizki Alfian"]
        };

        let currentRole = 'musyrif';
        let loggedUser = null;
        let allData = [];

        function setRole(r) {
            currentRole = r;
            document.getElementById('tab-m').className = r === 'musyrif' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('tab-a').className = r === 'admin' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('form-musyrif').style.display = r === 'musyrif' ? 'block' : 'none';
            document.getElementById('form-admin').style.display = r === 'admin' ? 'block' : 'none';
        }

        function loadMusyrifNames() {
            const asrama = document.getElementById('login-asrama').value;
            const sel = document.getElementById('login-nama');
            sel.innerHTML = '<option value="">-- Pilih Nama --</option>';
            if(asrama) {
                sel.disabled = false;
                DATA_MUSYRIF[asrama].forEach(n => sel.innerHTML += `<option value="${n}">${n}</option>`);
            } else {
                sel.disabled = true;
            }
        }

        function doLogin() {
            const n = document.getElementById('login-nama').value;
            const p = document.getElementById('login-pass').value;
            const a = document.getElementById('login-asrama').value;
            if(!n || !p) return notify('Lengkapi data login!');
            
            loggedUser = { name: n, asrama: a, role: 'musyrif' };
            showDashboard();
        }

        function doLoginAdmin() {
            if(document.getElementById('login-pin').value === "1234") {
                loggedUser = { name: "Administrator", role: "admin" };
                showDashboard();
            } else { notify('PIN Salah!'); }
        }

        function showDashboard() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('header-title').textContent = loggedUser.role === 'admin' ? '🛡️ Dashboard Admin' : '📋 Panel Musyrif';
            document.getElementById('header-user').textContent = `${loggedUser.name} (${loggedUser.asrama || 'Admin'})`;
            
            if(loggedUser.role === 'admin') {
                document.getElementById('admin-view').style.display = 'block';
                document.getElementById('musyrif-view').style.display = 'none';
            }

            // Mulai Sinkronisasi
            window.startSync = startCloudSync;
            startCloudSync();
        }

        async function startCloudSync() {
            if (!window.currentUser) {
                console.log("Menunggu autentikasi...");
                return;
            }
            
            document.getElementById('loading-overlay').style.display = 'flex';
            try {
                const colRef = window.collection(window.db, 'artifacts', window.appId, 'public', 'data', 'absensi_records');
                window.onSnapshot(colRef, (snap) => {
                    allData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    allData.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                    renderTables();
                    document.getElementById('loading-overlay').style.display = 'none';
                }, (err) => {
                    console.error("Firestore Error:", err);
                    document.getElementById('loading-overlay').style.display = 'none';
                    notify("Gagal memuat data. Periksa izin atau koneksi.");
                });
            } catch (e) {
                console.error("Sync Error:", e);
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }

        function renderTables() {
            if(loggedUser.role === 'admin') {
                const tbody = document.getElementById('admin-table');
                tbody.innerHTML = allData.map(d => `
                    <tr>
                        <td>${new Date(d.timestamp).toLocaleString('id-ID')}</td>
                        <td>${d.nama}</td>
                        <td>${d.asrama}</td>
                        <td>${d.kegiatan}</td>
                        <td><img src="${d.foto}" class="photo-preview" onclick="viewImg('${d.foto}')"></td>
                        <td><button onclick="hapusData('${d.id}')" style="color:red;border:none;background:none;cursor:pointer;">Hapus</button></td>
                    </tr>
                `).join('');
            } else {
                const my = allData.filter(d => d.nama === loggedUser.name);
                document.getElementById('st-total').textContent = my.length;
                document.getElementById('st-today').textContent = my.filter(d => new Date(d.timestamp).toDateString() === new Date().toDateString()).length;
                
                const tbody = document.getElementById('my-history');
                tbody.innerHTML = my.slice(0,10).map(d => `
                    <tr>
                        <td>${new Date(d.timestamp).toLocaleTimeString('id-ID')}</td>
                        <td>${d.kegiatan}</td>
                        <td><img src="${d.foto}" class="photo-preview" onclick="viewImg('${d.foto}')"></td>
                    </tr>
                `).join('');
            }
        }

        async function submitAbsen() {
            const file = document.getElementById('abs-foto').files[0];
            const keg = document.getElementById('abs-kegiatan').value;
            
            if(!window.currentUser) return notify('Koneksi belum siap. Tunggu sebentar.');
            if(!file) return notify('Ambil foto dahulu!');

            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.textContent = "⏳ Menyimpan ke Cloud...";

            try {
                const base64 = await compressImage(file);
                
                const dataAbsen = {
                    nama: loggedUser.name,
                    asrama: loggedUser.asrama,
                    kegiatan: keg,
                    foto: base64,
                    timestamp: new Date().toISOString()
                };

                const colRef = window.collection(window.db, 'artifacts', window.appId, 'public', 'data', 'absensi_records');
                await window.addDoc(colRef, dataAbsen);
                
                notify("✅ Berhasil dikirim!");
                document.getElementById('abs-foto').value = "";
            } catch (err) {
                console.error(err);
                notify("❌ Gagal mengirim. Cek internet.");
            } finally {
                btn.disabled = false;
                btn.textContent = "✅ Kirim Absensi";
            }
        }

        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const maxWidth = 800;
                        const scale = maxWidth / img.width;
                        canvas.width = maxWidth;
                        canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        }

        async function hapusData(id) {
            if(!confirm("Hapus data ini?")) return;
            try {
                const docRef = window.doc(window.db, 'artifacts', window.appId, 'public', 'data', 'absensi_records', id);
                await window.deleteDoc(docRef);
                notify("Terhapus.");
            } catch (e) { notify("Gagal menghapus."); }
        }

        function exportData() {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();
            pdf.text("Laporan Absensi Musyrif", 10, 10);
            
            let y = 20;
            allData.forEach((d, i) => {
                if (y > 280) { pdf.addPage(); y = 10; }
                const line = `${i+1}. ${d.nama} | ${d.asrama} | ${d.kegiatan} | ${new Date(d.timestamp).toLocaleDateString()}`;
                pdf.text(line, 10, y);
                y += 10;
            });
            
            pdf.save(`Laporan_Absensi_${new Date().toLocaleDateString()}.pdf`);
        }

        function viewImg(src) {
            document.getElementById('modal-img').src = src;
            document.getElementById('img-modal').style.display = 'flex';
        }

        function notify(msg) {
            const div = document.createElement('div');
            div.style.cssText = "position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:12px 24px;border-radius:10px;z-index:99999;font-size:0.9rem;box-shadow:0 4px 15px rgba(0,0,0,0.3);";
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }
    </script>
</body>
</html>
