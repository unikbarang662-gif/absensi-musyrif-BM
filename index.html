<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Musyrif - Online</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #e8f5e9; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .btn-green { background: #2e7d32; color: white; }
        .btn-red { background: #d32f2f; color: white; }
        .btn-wa { background: #25D366; color: white; }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0 10px 0; border: 1px solid #ccc; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 8px 4px; text-align: left; border-bottom: 1px solid #ddd; }
        .foto { width: 35px; height: 35px; object-fit: cover; border-radius: 5px; cursor: pointer; }
        .header { background: #2e7d32; color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; position: relative; }
        .logout { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 12px; border-radius: 20px; cursor: pointer; }
        .tab { display: inline-block; width: 49%; text-align: center; padding: 10px; background: #ddd; border-radius: 30px; cursor: pointer; margin-bottom: 15px; }
        .tab.active { background: #2e7d32; color: white; }
        .hidden { display: none; }
        .error { background: #ffebee; color: #d32f2f; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: none; }
        .stats { display: flex; gap: 8px; margin-bottom: 15px; }
        .stat { flex: 1; background: #2e7d32; color: white; padding: 8px; border-radius: 10px; text-align: center; }
        .stat .angka { font-size: 20px; font-weight: bold; }
        .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; display: none; justify-content: center; align-items: center; color: white; flex-direction: column; gap: 15px; }
        .spinner { width: 40px; height: 40px; border: 4px solid white; border-top-color: #2e7d32; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading" class="loading"><div class="spinner"></div><div>Memuat data...</div></div>

<div id="loginSection">
    <div class="card">
        <h3 style="text-align:center">📋 ABSENSI MUSYRIF</h3>
        <div id="loginError" class="error"></div>
        <div>
            <span class="tab active" onclick="pilihTab('musyrif')">MUSYRIF</span>
            <span class="tab" onclick="pilihTab('admin')">ADMIN</span>
        </div>
        
        <form id="formMusyrif">
            <select id="inputAsrama">
                <option value="">-- Pilih Asrama --</option>
                <option value="hakim">Asrama Al Hakim</option>
                <option value="fattah">Asrama Al Fattah</option>
                <option value="karim">Asrama Al Karim</option>
            </select>
            <select id="inputNama" disabled>
                <option value="">-- Pilih Asrama dulu --</option>
            </select>
            <input type="password" id="inputPassword" placeholder="Password">
            <button type="submit" class="btn btn-green">🔐 MASUK</button>
        </form>
        
        <form id="formAdmin" class="hidden">
            <input type="password" id="inputPin" placeholder="PIN Admin">
            <button type="submit" class="btn btn-green">🛡️ MASUK ADMIN</button>
        </form>
    </div>
</div>

<div id="appSection" style="display:none">
    <div class="header">
        <h4 id="titleApp">Dashboard</h4>
        <p id="infoUser" style="font-size:12px; margin-top:5px;"></p>
        <button class="logout" onclick="logout()">Keluar</button>
    </div>
    
    <div id="adminArea">
        <div class="card">
            <button class="btn btn-green" onclick="loadData()">🔄 REFRESH DATA</button>
            <button class="btn btn-wa" onclick="kirimWA()">📱 KIRIM PENGINGAT WA</button>
        </div>
        <div class="stats">
            <div class="stat"><div class="angka" id="statHari">0</div><div>HARI INI</div></div>
            <div class="stat"><div class="angka" id="statMinggu">0</div><div>MINGGU</div></div>
            <div class="stat"><div class="angka" id="statBulan">0</div><div>BULAN</div></div>
        </div>
        <div class="card">
            <h4>📜 SEMUA DATA</h4>
            <div style="overflow-x:auto">
                <table id="tabelData">
                    <thead><tr><th>Waktu</th><th>Nama</th><th>Asrama</th><th>Kegiatan</th><th>Foto</th><th></th></tr></thead>
                    <tbody id="adminTableBody"><td><td colspan="6">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div id="userArea" class="hidden">
        <div class="stats">
            <div class="stat"><div class="angka" id="userHarian">0%</div><div>HARIAN</div></div>
            <div class="stat"><div class="angka" id="userMingguan">0%</div><div>MINGGU</div></div>
            <div class="stat"><div class="angka" id="userBulanan">0%</div><div>BULAN</div></div>
        </div>
        <div class="card">
            <h4>📝 FORM ABSENSI</h4>
            <select id="pilihKegiatan">
                <option value="">-- Pilih --</option>
                <option value="Membangunkan Santri">Membangunkan Santri</option>
                <option value="Pengajian Subuh">Pengajian Subuh</option>
                <option value="Menggobraki Sekolah">Menggobraki Sekolah</option>
                <option value="Piket Kamar">Piket Kamar</option>
                <option value="Pendampingan Dalail">Pendampingan Dalail</option>
                <option value="Pendampingan Tawasulan">Pendampingan Tawasulan</option>
                <option value="Muthola'ah">Muthola'ah</option>
                <option value="Tidur Malam">Tidur Malam</option>
            </select>
            <input type="file" id="pilihFoto" accept="image/*" capture="user">
            <textarea id="isiCatatan" rows="2" placeholder="Catatan..."></textarea>
            <button class="btn btn-green" onclick="simpanAbsen()" id="btnSimpan">📤 KIRIM ABSENSI</button>
        </div>
        <div class="card">
            <h4>📜 RIWAYAT SAYA</h4>
            <div style="overflow-x:auto">
                <table id="riwayatTable">
                    <thead><tr><th>Waktu</th><th>Kegiatan</th><th>Foto</th></tr></thead>
                    <tbody id="riwayatBody"><td><td colspan="3">Belum ada data</td>}^</tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="modalFoto" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:3000; text-align:center; padding-top:20%;" onclick="this.style.display='none'">
    <img id="modalImg" style="max-width:90%; max-height:80%; border-radius:10px;">
</div>

<script>
// 🔴🔴🔴 URL HASIL DEPLOY ANDA 🔴🔴🔴
const API_URL = "https://script.google.com/macros/s/AKfycbw5CE9L4Ax7FYWLnW8j4G81us5af-yMbdICrpV4PlxUUgeuUD8GCUe2LoU-55isMH8j/exec";

const PIN_ADMIN = "1234";

const DATA_MUSYRIF = {
    hakim: { nama: "Asrama Al Hakim", pass: { "Ali Mashuri":"ali123", "Ali Zahid":"zahid123", "Reva Dwi":"reva123", "Imam Syafi'i":"imam123" }, kamar: { "Ali Mashuri":"Khondak", "Ali Zahid":"Badar", "Reva Dwi":"Khoibar", "Imam Syafi'i":"Multazam" } },
    fattah: { nama: "Asrama Al Fattah", pass: { "Fattahilah":"fattah123", "Brian Adi Waskito":"brian123", "Babil Yasar":"babil123", "Fahmi":"fahmi123", "Wawan Febi":"wawan123" }, kamar: { "Fattahilah":"Quba", "Brian Adi Waskito":"Bir Ali", "Babil Yasar":"Mina", "Fahmi":"Arofah", "Wawan Febi":"RBQ" } },
    karim: { nama: "Asrama Al Karim", pass: { "Bima Julian":"bima123", "Irfan Khoirul Aziz":"irfan123", "Rizki Alfian":"rizki123" }, kamar: { "Bima Julian":"101", "Irfan Khoirul Aziz":"104", "Rizki Alfian":"203" } }
};

let role = "", userLogin = "", asramaLogin = "", semuaData = [];

async function loadFromServer() {
    document.getElementById('loading').style.display = 'flex';
    try {
        const response = await fetch(API_URL);
        const data = await response.json();
        if (data && !data.error) {
            semuaData = data;
            console.log("Data dari server:", semuaData.length);
        } else {
            semuaData = [];
        }
    } catch(e) {
        console.error("Gagal:", e);
        semuaData = [];
    }
    document.getElementById('loading').style.display = 'none';
}

async function saveToServer(data) {
    try {
        await fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        return true;
    } catch(e) {
        return false;
    }
}

document.getElementById('inputAsrama').onchange = function() {
    const as = this.value;
    const selectNama = document.getElementById('inputNama');
    if (as && DATA_MUSYRIF[as]) {
        selectNama.disabled = false;
        selectNama.innerHTML = '<option value="">-- Pilih --</option>';
        for (let n in DATA_MUSYRIF[as].pass) {
            selectNama.innerHTML += `<option value="${n}">${n}</option>`;
        }
    } else {
        selectNama.disabled = true;
        selectNama.innerHTML = '<option value="">-- Pilih Asrama --</option>';
    }
};

function pilihTab(tab) {
    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(t => t.classList.remove('active'));
    if (tab === 'admin') {
        tabs[1].classList.add('active');
        document.getElementById('formMusyrif').classList.add('hidden');
        document.getElementById('formAdmin').classList.remove('hidden');
    } else {
        tabs[0].classList.add('active');
        document.getElementById('formMusyrif').classList.remove('hidden');
        document.getElementById('formAdmin').classList.add('hidden');
    }
}

document.getElementById('formMusyrif').onsubmit = async function(e) {
    e.preventDefault();
    const as = document.getElementById('inputAsrama').value;
    const nm = document.getElementById('inputNama').value;
    const ps = document.getElementById('inputPassword').value;
    
    if (DATA_MUSYRIF[as] && DATA_MUSYRIF[as].pass[nm] === ps) {
        role = "musyrif";
        userLogin = nm;
        asramaLogin = as;
        await startApp();
    } else {
        const err = document.getElementById('loginError');
        err.innerHTML = "❌ Password salah!";
        err.style.display = 'block';
        setTimeout(() => err.style.display = 'none', 3000);
    }
};

document.getElementById('formAdmin').onsubmit = async function(e) {
    e.preventDefault();
    const pin = document.getElementById('inputPin').value;
    if (pin === PIN_ADMIN) {
        role = "admin";
        await startApp();
    } else {
        const err = document.getElementById('loginError');
        err.innerHTML = "❌ PIN salah! PIN = 1234";
        err.style.display = 'block';
        setTimeout(() => err.style.display = 'none', 3000);
    }
};

async function startApp() {
    await loadFromServer();
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('appSection').style.display = 'block';
    
    if (role === "admin") {
        document.getElementById('titleApp').innerHTML = "🛡️ ADMIN DASHBOARD";
        document.getElementById('infoUser').innerHTML = "Administrator | Data online";
        document.getElementById('adminArea').style.display = 'block';
        document.getElementById('userArea').classList.add('hidden');
        renderAdmin();
    } else {
        document.getElementById('titleApp').innerHTML = "📋 ABSENSI MUSYRIF";
        document.getElementById('infoUser').innerHTML = `${userLogin} | ${DATA_MUSYRIF[asramaLogin].nama}`;
        document.getElementById('adminArea').style.display = 'none';
        document.getElementById('userArea').classList.remove('hidden');
        renderUser();
    }
}

function logout() { location.reload(); }

function renderAdmin() {
    const today = new Date().toDateString();
    const weekAgo = new Date(Date.now() - 7*86400000);
    const monthAgo = new Date(Date.now() - 30*86400000);
    let h=0, m=0, b=0;
    
    for (let d of semuaData) {
        const tgl = new Date(d.Timestamp);
        if (tgl.toDateString() === today) h++;
        if (tgl >= weekAgo) m++;
        if (tgl >= monthAgo) b++;
    }
    document.getElementById('statHari').innerHTML = h;
    document.getElementById('statMinggu').innerHTML = m;
    document.getElementById('statBulan').innerHTML = b;
    
    if (semuaData.length === 0) {
        document.getElementById('adminTableBody').innerHTML = '<tr><td colspan="6">Belum ada数据</td></tr>';
        return;
    }
    
    let html = "";
    const sorted = [...semuaData].reverse();
    for (let d of sorted) {
        html += `<tr>
            <td>${new Date(d.Timestamp).toLocaleString()}</td>
            <td>${d.Nama}</td>
            <td>${d.Asrama || '-'}</td>
            <td>${d.Kegiatan}</td>
            <td>${d.Foto ? `<img src="${d.Foto}" class="foto" onclick="lihatFoto('${d.Foto}')">` : '-'}</td>
            <td><button onclick="hapusData('${d.Timestamp}')" style="background:#d32f2f; color:white; border:none; padding:4px 8px; border-radius:20px;">Hapus</button></td>
        </tr>`;
    }
    document.getElementById('adminTableBody').innerHTML = html;
}

async function hapusData(timestamp) {
    if (confirm("Hapus data ini?")) {
        await fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'delete', timestamp: timestamp })
        });
        await loadFromServer();
        renderAdmin();
        alert("Data dihapus!");
    }
}

async function loadData() {
    await loadFromServer();
    if (role === "admin") renderAdmin();
    else renderUser();
    alert("Data direfresh!");
}

function kirimWA() {
    window.open("https://wa.me/?text=Pengingat%20Absensi%20Musyrif");
}

function renderUser() {
    const myData = semuaData.filter(d => d.Nama === userLogin);
    const today = new Date().toDateString();
    const weekAgo = new Date(Date.now() - 7*86400000);
    const monthAgo = new Date(Date.now() - 30*86400000);
    
    const h = myData.some(d => new Date(d.Timestamp).toDateString() === today) ? 100 : 0;
    const m = Math.min(100, Math.round(myData.filter(d => new Date(d.Timestamp) >= weekAgo).length / 7 * 100));
    const b = Math.min(100, Math.round(myData.filter(d => new Date(d.Timestamp) >= monthAgo).length / 30 * 100));
    
    document.getElementById('userHarian').innerHTML = h + "%";
    document.getElementById('userMingguan').innerHTML = m + "%";
    document.getElementById('userBulanan').innerHTML = b + "%";
    
    if (myData.length === 0) {
        document.getElementById('riwayatBody').innerHTML = '<td><td colspan="3">Belum ada data</td></tr>';
        return;
    }
    
    let html = "";
    const sorted = [...myData].reverse();
    for (let d of sorted) {
        html += `<tr>
            <td>${new Date(d.Timestamp).toLocaleString()}</td>
            <td>${d.Kegiatan}</td>
            <td>${d.Foto ? `<img src="${d.Foto}" class="foto" onclick="lihatFoto('${d.Foto}')">` : '-'}</td>
        </tr>`;
    }
    document.getElementById('riwayatBody').innerHTML = html;
}

async function simpanAbsen() {
    const kegiatan = document.getElementById('pilihKegiatan').value;
    const fileFoto = document.getElementById('pilihFoto').files[0];
    const catatan = document.getElementById('isiCatatan').value;
    
    if (!kegiatan) { alert("Pilih kegiatan!"); return; }
    if (!fileFoto) { alert("Ambil foto!"); return; }
    
    const btn = document.getElementById('btnSimpan');
    btn.disabled = true;
    btn.innerHTML = "Menyimpan...";
    document.getElementById('loading').style.display = 'flex';
    
    try {
        const fotoBase64 = await bacaFile(fileFoto);
        await saveToServer({
            action: 'save',
            timestamp: new Date().toISOString(),
            nama: userLogin,
            asrama: DATA_MUSYRIF[asramaLogin].nama,
            kamar: DATA_MUSYRIF[asramaLogin].kamar[userLogin],
            kegiatan: kegiatan,
            foto: fotoBase64,
            catatan: catatan
        });
        
        await loadFromServer();
        alert("✅ ABSENSI BERHASIL DISIMPAN!");
        document.getElementById('pilihKegiatan').value = "";
        document.getElementById('pilihFoto').value = "";
        document.getElementById('isiCatatan').value = "";
        renderUser();
        
    } catch(err) {
        alert("❌ Gagal: " + err.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = "📤 KIRIM ABSENSI";
        document.getElementById('loading').style.display = 'none';
    }
}

function bacaFile(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
    });
}

function lihatFoto(src) {
    document.getElementById('modalImg').src = src;
    document.getElementById('modalFoto').style.display = 'block';
}

console.log("✅ Aplikasi siap!");
</script>
</body>
</html>
