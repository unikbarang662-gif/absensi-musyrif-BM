<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Musyrif - TEST</title>
    <style>
        body { 
            font-family: Arial; 
            max-width: 500px; 
            margin: 0 auto; 
            padding: 20px; 
            background: #f0f0f0;
        }
        .box { 
            background: white; 
            padding: 20px; 
            border-radius: 10px; 
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h2 { color: #2e7d32; margin: 0 0 15px 0; }
        input, select, button, textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background: #2e7d32;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        button:active { transform: scale(0.98); }
        .btn-danger { background: #d32f2f; }
        .btn-wa { background: #25D366; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
        .foto { width: 40px; height: 40px; object-fit: cover; border-radius: 5px; cursor: pointer; }
        .hidden { display: none; }
        .error { color: red; background: #ffebee; padding: 10px; border-radius: 5px; margin-bottom: 10px; display: none; }
        .success { color: green; background: #e8f5e9; padding: 10px; border-radius: 5px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginBox" class="box">
    <h2>📋 ABSENSI MUSYRIF</h2>
    <div id="errorMsg" class="error"></div>
    
    <select id="asramaSelect">
        <option value="">-- Pilih Asrama --</option>
        <option value="hakim">Al Hakim</option>
        <option value="fattah">Al Fattah</option>
        <option value="karim">Al Karim</option>
    </select>
    
    <select id="namaSelect" disabled>
        <option value="">-- Pilih Asrama dulu --</option>
    </select>
    
    <input type="password" id="passInput" placeholder="Password">
    
    <button onclick="loginMusyrif()">🔐 MASUK MUSYRIF</button>
    <button onclick="loginAdmin()" style="background:#ff9800">🛡️ MASUK ADMIN</button>
</div>

<!-- MAIN APP -->
<div id="appBox" class="box" style="display:none">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 id="titleApp">Dashboard</h2>
        <button onclick="logout()" style="width:auto; background:#666; margin:0;">Keluar</button>
    </div>
    <p id="infoUser" style="background:#e8f5e9; padding:10px; border-radius:5px;"></p>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="box" style="display:none">
    <h3>📊 Statistik</h3>
    <p>✅ Hari ini: <span id="statHari">0</span> kali</p>
    <p>📆 Minggu ini: <span id="statMinggu">0</span> kali</p>
    <p>📅 Bulan ini: <span id="statBulan">0</span> kali</p>
    <button onclick="refreshAdmin()">🔄 Refresh</button>
    <button onclick="kirimWaAdmin()" class="btn-wa">📱 Kirim WA</button>
    
    <h3 style="margin-top:20px">📜 Semua Data Absensi</h3>
    <div id="dataTable" style="overflow-x:auto"></div>
</div>

<!-- USER PANEL -->
<div id="userPanel" class="box" style="display:none">
    <h3>📝 Form Absensi</h3>
    <select id="kegiatanSelect">
        <option value="">-- Pilih Kegiatan --</option>
        <option value="Membangunkan Santri">Membangunkan Santri</option>
        <option value="Pengajian Subuh">Pengajian Subuh</option>
        <option value="Menggobraki Sekolah">Menggobraki Sekolah</option>
        <option value="Piket Kamar">Piket Kamar</option>
        <option value="Pendampingan Dalail">Pendampingan Dalail</option>
        <option value="Pendampingan Tawasulan">Pendampingan Tawasulan</option>
        <option value="Muthola'ah">Muthola'ah</option>
        <option value="Menertibkan Tidur">Menertibkan Tidur</option>
    </select>
    
    <input type="file" id="fotoInput" accept="image/*" capture="user">
    <textarea id="catatanInput" rows="2" placeholder="Catatan (opsional)"></textarea>
    
    <button id="submitBtn" onclick="kirimAbsensi()">✅ KIRIM ABSENSI</button>
    
    <h3 style="margin-top:20px">📜 Riwayat Saya</h3>
    <div id="riwayatTable" style="overflow-x:auto"></div>
</div>

<!-- MODAL FOTO -->
<div id="modalFoto" onclick="this.style.display='none'" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000;">
    <img id="modalImg" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); max-width:90%; max-height:90%; border-radius:10px;">
</div>

<script>
    // ==================== DATA ====================
    const STORAGE_KEY = "data_absensi_v1";
    const PIN_ADMIN = "1234";
    
    const MUSYRIF_DATA = {
        hakim: {
            nama: "Asrama Al Hakim",
            list: {
                "Ali Mashuri": "ali123",
                "Ali Zahid": "zahid123",
                "Reva Dwi": "reva123",
                "Imam Syafi'i": "imam123"
            }
        },
        fattah: {
            nama: "Asrama Al Fattah",
            list: {
                "Fattahilah": "fattah123",
                "Brian Adi Waskito": "brian123",
                "Babil Yasar": "babil123",
                "Fahmi": "fahmi123",
                "Wawan Febi": "wawan123"
            }
        },
        karim: {
            nama: "Asrama Al Karim",
            list: {
                "Bima Julian": "bima123",
                "Irfan Khoirul Aziz": "irfan123",
                "Rizki Alfian": "rizki123"
            }
        }
    };
    
    let currentRole = "";
    let currentUser = "";
    let currentAsrama = "";
    let allData = [];
    
    // ==================== FUNGSI DATA ====================
    function loadAllData() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            try {
                allData = JSON.parse(saved);
                console.log("Data dimuat:", allData.length, "record");
            } catch(e) {
                allData = [];
            }
        } else {
            allData = [];
            console.log("Data kosong");
        }
    }
    
    function saveAllData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
        console.log("Data disimpan:", allData.length, "record");
        return true;
    }
    
    // ==================== LOGIN ====================
    document.getElementById('asramaSelect').onchange = function() {
        const asramaKey = this.value;
        const namaSelect = document.getElementById('namaSelect');
        if (asramaKey && MUSYRIF_DATA[asramaKey]) {
            namaSelect.disabled = false;
            namaSelect.innerHTML = '<option value="">-- Pilih Musyrif --</option>';
            for (let nama in MUSYRIF_DATA[asramaKey].list) {
                namaSelect.innerHTML += `<option value="${nama}">${nama}</option>`;
            }
        } else {
            namaSelect.disabled = true;
            namaSelect.innerHTML = '<option value="">-- Pilih Asrama dulu --</option>';
        }
    };
    
    function loginMusyrif() {
        const asramaKey = document.getElementById('asramaSelect').value;
        const nama = document.getElementById('namaSelect').value;
        const pass = document.getElementById('passInput').value;
        
        if (!asramaKey || !nama) {
            showError("Pilih asrama dan nama musyrif!");
            return;
        }
        
        const passBenar = MUSYRIF_DATA[asramaKey].list[nama];
        if (passBenar === pass) {
            currentRole = "musyrif";
            currentUser = nama;
            currentAsrama = asramaKey;
            startApp();
        } else {
            showError("Password salah! Coba: " + passBenar);
        }
    }
    
    function loginAdmin() {
        const pin = prompt("Masukkan PIN Admin:");
        if (pin === PIN_ADMIN) {
            currentRole = "admin";
            currentUser = "Admin";
            startApp();
        } else {
            showError("PIN Admin salah!");
        }
    }
    
    function showError(msg) {
        const div = document.getElementById('errorMsg');
        div.textContent = msg;
        div.style.display = 'block';
        setTimeout(() => div.style.display = 'none', 3000);
    }
    
    function startApp() {
        loadAllData();
        
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('appBox').style.display = 'block';
        
        if (currentRole === "admin") {
            document.getElementById('titleApp').innerHTML = "🛡️ DASHBOARD ADMIN";
            document.getElementById('infoUser').innerHTML = "👑 Administrator | Akses Penuh";
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('userPanel').style.display = 'none';
            renderAdmin();
        } else {
            const asramaNama = MUSYRIF_DATA[currentAsrama].nama;
            document.getElementById('titleApp').innerHTML = "📋 ABSENSI MUSYRIF";
            document.getElementById('infoUser').innerHTML = `👤 ${currentUser} | ${asramaNama}`;
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('userPanel').style.display = 'block';
            renderUser();
        }
    }
    
    function logout() {
        location.reload();
    }
    
    // ==================== ADMIN FUNCTIONS ====================
    function renderAdmin() {
        const today = new Date().toDateString();
        const weekAgo = new Date(Date.now() - 7 * 86400000);
        const monthAgo = new Date(Date.now() - 30 * 86400000);
        
        let countHari = 0, countMinggu = 0, countBulan = 0;
        for (let i = 0; i < allData.length; i++) {
            const tgl = new Date(allData[i].timestamp);
            if (tgl.toDateString() === today) countHari++;
            if (tgl >= weekAgo) countMinggu++;
            if (tgl >= monthAgo) countBulan++;
        }
        
        document.getElementById('statHari').innerHTML = countHari;
        document.getElementById('statMinggu').innerHTML = countMinggu;
        document.getElementById('statBulan').innerHTML = countBulan;
        
        if (allData.length === 0) {
            document.getElementById('dataTable').innerHTML = '<p style="text-align:center">Belum ada data</p>';
            return;
        }
        
        let html = '<table><tr><th>Waktu</th><th>Nama</th><th>Asrama</th><th>Kegiatan</th><th>Foto</th><th></th></tr>';
        const sorted = [...allData].reverse();
        for (let i = 0; i < sorted.length; i++) {
            const d = sorted[i];
            const fotoHtml = d.foto ? `<img src="${d.foto}" class="foto" onclick="lihatFoto('${d.foto}')">` : '-';
            html += `<tr>
                <td>${new Date(d.timestamp).toLocaleString()}</td>
                <td>${d.nama}</td>
                <td>${d.asrama}</td>
                <td>${d.kegiatan}</td>
                <td>${fotoHtml}</td>
                <td><button onclick="hapusData('${d.timestamp}')" style="background:#d32f2f; padding:5px 10px; width:auto;">Hapus</button></td>
            </tr>`;
        }
        html += '</table>';
        document.getElementById('dataTable').innerHTML = html;
    }
    
    function hapusData(timestamp) {
        if (confirm('Yakin hapus data ini?')) {
            allData = allData.filter(d => d.timestamp !== timestamp);
            saveAllData();
            renderAdmin();
            alert('Data dihapus!');
        }
    }
    
    function refreshAdmin() {
        loadAllData();
        renderAdmin();
        alert('Data direfresh!');
    }
    
    function kirimWaAdmin() {
        const today = new Date().toDateString();
        const belumAbsen = [];
        
        for (let a in MUSYRIF_DATA) {
            for (let n in MUSYRIF_DATA[a].list) {
                let sudah = false;
                for (let i = 0; i < allData.length; i++) {
                    if (allData[i].nama === n && new Date(allData[i].timestamp).toDateString() === today) {
                        sudah = true;
                        break;
                    }
                }
                if (!sudah) belumAbsen.push(n);
            }
        }
        
        if (belumAbsen.length === 0) {
            alert('✅ Semua sudah absen hari ini!');
        } else {
            const pesan = `*PENGINGAT ABSENSI*\n\nBelum absen hari ini:\n${belumAbsen.join('\n')}\n\nSegera lakukan absensi!`;
            window.open(`https://wa.me/?text=${encodeURIComponent(pesan)}`);
        }
    }
    
    // ==================== USER FUNCTIONS ====================
    function renderUser() {
        const myData = allData.filter(d => d.nama === currentUser);
        
        if (myData.length === 0) {
            document.getElementById('riwayatTable').innerHTML = '<p style="text-align:center">Belum ada riwayat</p>';
            return;
        }
        
        let html = '<table><tr><th>Waktu</th><th>Kegiatan</th><th>Foto</th></tr>';
        const sorted = [...myData].reverse();
        for (let i = 0; i < sorted.length; i++) {
            const d = sorted[i];
            const fotoHtml = d.foto ? `<img src="${d.foto}" class="foto" onclick="lihatFoto('${d.foto}')">` : '-';
            html += `<tr>
                <td>${new Date(d.timestamp).toLocaleString()}</td>
                <td>${d.kegiatan}</td>
                <td>${fotoHtml}</td>
            </tr>`;
        }
        html += '</table>';
        document.getElementById('riwayatTable').innerHTML = html;
        
        // Update stat di info
        const today = new Date().toDateString();
        const weekAgo = new Date(Date.now() - 7 * 86400000);
        const hadirHari = myData.some(d => new Date(d.timestamp).toDateString() === today);
        const countMinggu = myData.filter(d => new Date(d.timestamp) >= weekAgo).length;
        const persenHari = hadirHari ? 100 : 0;
        const persenMinggu = Math.min(100, Math.round(countMinggu / 7 * 100));
        document.getElementById('infoUser').innerHTML = `👤 ${currentUser} | ${MUSYRIF_DATA[currentAsrama].nama} | Harian:${persenHari}% | Minggu:${persenMinggu}%`;
    }
    
    async function kirimAbsensi() {
        const kegiatan = document.getElementById('kegiatanSelect').value;
        const fileFoto = document.getElementById('fotoInput').files[0];
        const catatan = document.getElementById('catatanInput').value;
        
        if (!kegiatan) {
            alert("Pilih kegiatan!");
            return;
        }
        if (!fileFoto) {
            alert("Ambil foto dulu!");
            return;
        }
        
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = "⏳ MENYIMPAN...";
        
        try {
            const fotoBase64 = await bacaFile(fileFoto);
            
            const dataBaru = {
                timestamp: new Date().toISOString(),
                nama: currentUser,
                asrama: MUSYRIF_DATA[currentAsrama].nama,
                kegiatan: kegiatan,
                foto: fotoBase64,
                catatan: catatan
            };
            
            allData.push(dataBaru);
            const saved = saveAllData();
            
            if (saved) {
                alert("✅ ABSENSI BERHASIL DISIMPAN!");
                console.log("Total data sekarang:", allData.length);
                
                document.getElementById('kegiatanSelect').value = "";
                document.getElementById('fotoInput').value = "";
                document.getElementById('catatanInput').value = "";
                
                renderUser();
            } else {
                alert("❌ Gagal menyimpan!");
            }
            
        } catch(err) {
            alert("❌ Error: " + err.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = "✅ KIRIM ABSENSI";
        }
    }
    
    function bacaFile(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = () => reject(reader.error);
            reader.readAsDataURL(file);
        });
    }
    
    function lihatFoto(src) {
        const modal = document.getElementById('modalFoto');
        const img = document.getElementById('modalImg');
        img.src = src;
        modal.style.display = 'block';
    }
    
    console.log("✅ APLIKASI SIAP - TESTED WORKING");
</script>
</body>
</html>
