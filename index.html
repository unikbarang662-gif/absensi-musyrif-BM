<!-- 🔥 MULAI KODE FIREBASE (JANGAN UBAH YANG LAIN) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAJTPkEkjSuBX6c13Hpvx7NWkSNugzmFNU",
    authDomain: "absensi-musyrif-bm.firebaseapp.com",
    databaseURL: "https://absensi-musyrif-bm-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "absensi-musyrif-bm",
    storageBucket: "absensi-musyrif-bm.firebasestorage.app",
    messagingSenderId: "968312390099",
    appId: "1:968312390099:web:d6ffcef5d50a0b4b63af26"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // FUNGSI 1: Menyimpan Data ke Cloud (Panggil ini saat tombol Kirim ditekan)
  window.simpanAbsensiKeCloud = function(dataObjek) {
    push(ref(db, 'absensi'), dataObjek)
      .then(() => console.log("✅ Tersimpan di Cloud"))
      .catch((err) => console.error("❌ Gagal:", err));
  };

  // FUNGSI 2: Mengambil Data dari Cloud (Panggil ini saat Refresh/Table butuh data)
  window.ambilDataDariCloud = function(callbackFunction) {
    onValue(ref(db, 'absensi'), (snapshot) => {
      const data = snapshot.val();
      // Ubah format data Firebase jadi Array biar mudah dipakai kode lama Anda
      const listData = data ? Object.values(data).reverse() : []; 
      callbackFunction(listData);
    });
  };
</script>
<!-- 🔥 SELESAI KODE FIREBASE -->
