<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Musyrif</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #e8f5e9; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-primary { background: #2e7d32; color: white; }
        .btn-wa { background: #25D366; color: white; }
        .btn-danger { background: #d32f2f; color: white; }
        .form-group { margin-bottom: 15px; }
        .form-group label { font-weight: bold; display: block; margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
        .error { background: #ffebee; color: #d32f2f; padding: 10px; border-radius: 8px; display: none; margin-bottom: 15px; text-align: center; }
        .success { background: #e8f5e9; color: #2e7d32; padding: 10px; border-radius: 8px; display: none; margin-bottom: 15px; text-align: center; }
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; text-align: center; background: #ddd; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .tab.active { background: #2e7d32; color: white; }
        .hidden { display: none; }
        .stats { display: flex; gap: 10px; margin-bottom: 15px; }
        .stat { flex: 1; background: linear-gradient(135deg, #2e7d32, #4caf50); color: white; padding: 12px; border-radius: 12px; text-align: center; }
        .stat .angka { font-size: 24px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 8px 5px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f5f5f5; }
        .foto-thumb { width: 35px; height: 35px; object-fit: cover; border-radius: 5px; cursor: pointer; }
        .header { background: #2e7d32; color: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; position: relative; }
        .logout { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 12px; border-radius: 20px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal img { max-width: 90%; max-height: 90%; border-radius: 10px; }
        .schedule-item { background: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 8px; border-left: 3px solid #2e7d32; }
        .perf-item { display: flex; justify-content: space-between; padding: 10px; background: #f5f5f5; border-radius: 10px; margin-bottom: 8px; }
        .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; color: white; }
        .badge-green { background: #4caf50; }
        .badge-orange { background: #ff9800; }
        .badge-red { background: #f44336; }
        .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; display: none; justify-content: center; align-items: center; flex-direction: column; gap: 15px; color: white; }
        .loading.active { display: flex; }
        .spinner { width: 40px; height: 40px; border: 4px solid white; border-top-color: #2e7d32; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">

<div id="loading" class="loading"><div class="spinner"></div><div>Memuat...</div></div>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
    <div class="card">
        <h3 style="text-align:center">📋 ABSENSI MUSYRIF</h3>
        <div class="tab-bar">
            <button class="tab active" onclick="showTab('musyrif')">MUSYRIF</button>
            <button class="tab" onclick="showTab('admin')">ADMIN</button>
        </div>
        <div id="loginError" class="error"></div>
        
        <!-- Form Musyrif -->
        <form id="formMusyrif">
            <div class="form-group">
                <label>ASRAMA</label>
                <select id="selectAsrama">
                    <option value="">-- Pilih --</option>
                    <option value="hakim">Al Hakim</option>
                    <option value="fattah">Al Fattah</option>
                    <option value="karim">Al Karim</option>
                </select>
            </div>
            <div class="form-group">
                <label>NAMA MUSYRIF</label>
                <select id="selectNama" disabled>
                    <option value="">-- Pilih Asrama dulu --</option>
                </select>
            </div>
            <div class="form-group">
                <label>PASSWORD</label>
                <input type="password" id="inputPass" placeholder="Password">
            </div>
            <button type="submit" class="btn btn-primary">MASUK</button>
            <button type="button" class="btn btn-wa" onclick="lupaPassword()">LUPA PASSWORD?</button>
        </form>
        
        <!-- Form Admin -->
        <form id="formAdmin" class="hidden">
            <div class="form-group">
                <label>PIN ADMIN</label>
                <input type="password" id="inputPin" placeholder="PIN Admin">
            </div>
            <button type="submit" class="btn btn-primary">MASUK ADMIN</button>
        </form>
    </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none">
    <div class="header">
        <h4 id="titleApp">Dashboard</h4>
        <p id="infoUser" style="font-size:12px; margin-top:5px"></p>
        <button class="logout" onclick="logout()">Keluar</button>
    </div>
    
    <!-- ADMIN PANEL -->
    <div id="adminPanel">
        <div class="card">
            <h3>⚙️ MENU ADMIN</h3>
            <button class="btn btn-primary" onclick="refreshData()">🔄 REFRESH DATA</button>
            <button class="btn btn-wa" onclick="sendWAReminder()">📱 KIRIM PENGINGAT</button>
        </div>
        
        <div class="stats">
            <div class="stat"><div class="angka" id="statHari">0</div><div>HARI INI</div></div>
            <div class="stat"><div class="angka" id="statMinggu">0</div><div>MINGGU</div></div>
            <div class="stat"><div class="angka" id="statBulan">0</div><div>BULAN</div></div>
        </div>
        
        <div class="card">
            <h3>📊 PERFORMA MUSYRIF</h3>
            <div id="performaList">Loading...</div>
        </div>
        
        <div class="card">
            <h3>📜 SEMUA DATA ABSENSI</h3>
            <div style="overflow-x:auto">
                <table id="tabelData">
                    <thead><tr><th>Waktu</th><th>Nama</th><th>Kegiatan</th><th>Foto</th><th></th></tr></thead>
                    <tbody id="adminTableBody"><tr><td colspan="5">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- MUSYRIF PANEL -->
    <div id="musyrifPanel" style="display:none">
        <div class="stats">
            <div class="stat"><div class="angka" id="myHarian">0%</div><div>HARIAN</div></div>
            <div class="stat"><div class="angka" id="myMingguan">0%</div><div>MINGGU</div></div>
            <div class="stat"><div class="angka" id="myBulanan">0%</div><div>BULAN</div></div>
        </div>
        
        <div class="card">
            <h3>📅 JADWAL HARI INI</h3>
            <div id="jadwalList"></div>
        </div>
        
        <div class="card">
            <h3>📝 FORM ABSENSI</h3>
            <form id="absensiForm">
                <div class="form-group">
                    <label>KEGIATAN</label>
                    <select id="kegiatanSelect" required>
                        <option value="">-- Pilih --</option>
                        <option value="Membangunkan Santri">Membangunkan Santri</option>
                        <option value="Pengajian Subuh">Pengajian Subuh</option>
                        <option value="Menggobraki Sekolah">Menggobraki Sekolah</option>
                        <option value="Piket Kamar">Piket Kamar</option>
                        <option value="Pendampingan Dalail">Pendampingan Dalail</option>
                        <option value="Pendampingan Tawasulan">Pendampingan Tawasulan</option>
                        <option value="Muthola'ah">Muthola'ah</option>
                        <option value="Tidur Malam">Tidur Malam</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📸 FOTO (Selfie)</label>
                    <input type="file" id="fotoInput" accept="image/*" capture="user" required>
                </div>
                <div class="form-group">
                    <label>📝 CATATAN</label>
                    <textarea id="catatanInput" rows="2" placeholder="Opsional..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">✅ KIRIM ABSENSI</button>
            </form>
        </div>
        
        <div class="card">
            <h3>📜 RIWAYAT SAYA</h3>
            <div style="overflow-x:auto">
                <table>
                    <thead><tr><th>Waktu</th><th>Kegiatan</th><th>Foto</th></tr></thead>
                    <tbody id="riwayatBody"><tr><td colspan="3">Belum ada data</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="modalFoto" class="modal" onclick="closeModal()"><img id="modalImg"></div>

<script>
// ==================== DATA ====================
const STORAGE_KEY = "absensi_data_v2";
const ADMIN_PIN = "1234";
const WA_ADMIN = "6285893588373";

const MUSYRIF = {
    hakim: { nama: "Asrama Al Hakim", pasar: { "Ali Mashuri": "ali123", "Ali Zahid": "zahid123", "Reva Dwi": "reva123", "Imam Syafi'i": "imam123" }, kamar: { "Ali Mashuri": "Khondak, Uhud", "Ali Zahid": "Badar", "Reva Dwi": "Khoibar", "Imam Syafi'i": "Multazam" } },
    fattah: { nama: "Asrama Al Fattah", pasar: { "Fattahilah": "fattah123", "Brian Adi Waskito": "brian123", "Babil Yasar": "babil123", "Fahmi": "fahmi123", "Wawan Febi": "wawan123" }, kamar: { "Fattahilah": "Quba, Mekkah, Madinah", "Brian Adi Waskito": "Bir'Ali, Zam-zam", "Babil Yasar": "Mina, Hudaibiyah", "Fahmi": "Arofah", "Wawan Febi": "RBQ" } },
    karim: { nama: "Asrama Al Karim", pasar: { "Bima Julian": "bima123", "Irfan Khoirul Aziz": "irfan123", "Rizki Alfian": "rizki123" }, kamar: { "Bima Julian": "101,102,103", "Irfan Khoirul Aziz": "104,201,202", "Rizki Alfian": "203,204" } }
};

const JADWAL = ["Membangunkan Santri", "Pengajian Subuh", "Menggobraki Sekolah", "Piket Kamar", "Pendampingan Dalail", "Pendampingan Tawasulan", "Muthola'ah", "Tidur Malam"];

let role = "", currentUser = "", currentAsrama = "", allData = [];

// ==================== FUNGSI DATA ====================
function loadStorage() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try { allData = JSON.parse(saved); } catch(e) { allData = []; }
    } else { allData = []; }
    console.log("Data loaded:", allData.length);
}

function saveStorage() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
    console.log("Data saved:", allData.length);
}

// ==================== FUNGSI LOGIN ====================
function showTab(tab) {
    const tabs = document.querySelectorAll('.tab');
    tabs.forEach(t => t.classList.remove('active'));
    if (tab === 'admin') {
        tabs[1].classList.add('active');
        document.getElementById('formMusyrif').classList.add('hidden');
        document.getElementById('formAdmin').classList.remove('hidden');
    } else {
        tabs[0].classList.add('active');
        document.getElementById('formMusyrif').classList.remove('hidden');
        document.getElementById('formAdmin').classList.add('hidden');
    }
}

document.getElementById('selectAsrama').addEventListener('change', function() {
    const as = this.value;
    const selectNama = document.getElementById('selectNama');
    if (as && MUSYRIF[as]) {
        selectNama.disabled = false;
        selectNama.innerHTML = '<option value="">-- Pilih --</option>';
        for (let n in MUSYRIF[as].pasar) {
            selectNama.innerHTML += `<option value="${n}">${n}</option>`;
        }
    } else {
        selectNama.disabled = true;
        selectNama.innerHTML = '<option value="">-- Pilih Asrama --</option>';
    }
});

document.getElementById('formMusyrif').addEventListener('submit', function(e) {
    e.preventDefault();
    const as = document.getElementById('selectAsrama').value;
    const nm = document.getElementById('selectNama').value;
    const ps = document.getElementById('inputPass').value;
    
    if (MUSYRIF[as] && MUSYRIF[as].pasar[nm] === ps) {
        role = "musyrif";
        currentUser = nm;
        currentAsrama = as;
        startApp();
    } else {
        showError("Password salah!");
    }
});

document.getElementById('formAdmin').addEventListener('submit', function(e) {
    e.preventDefault();
    const pin = document.getElementById('inputPin').value;
    if (pin === ADMIN_PIN) {
        role = "admin";
        startApp();
    } else {
        showError("PIN salah!");
    }
});

function showError(msg) {
    const div = document.getElementById('loginError');
    div.innerHTML = msg;
    div.style.display = 'block';
    setTimeout(() => div.style.display = 'none', 3000);
}

function showToast(msg) {
    alert(msg);
}

function lupaPassword() {
    const nama = document.getElementById('selectNama').value;
    if (!nama) { showError("Pilih nama dulu!"); return; }
    window.open(`https://wa.me/${WA_ADMIN}?text=${encodeURIComponent(`Halo, saya ${nama} lupa password.`)}`);
}

function startApp() {
    loadStorage();
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    
    if (role === "admin") {
        document.getElementById('titleApp').innerHTML = "🛡️ ADMIN PANEL";
        document.getElementById('infoUser').innerHTML = "Administrator";
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('musyrifPanel').style.display = 'none';
        renderAdmin();
    } else {
        const asramaNama = MUSYRIF[currentAsrama].nama;
        const kamar = MUSYRIF[currentAsrama].kamar[currentUser];
        document.getElementById('titleApp').innerHTML = "📋 ABSENSI MUSYRIF";
        document.getElementById('infoUser').innerHTML = `${currentUser} | ${kamar} | ${asramaNama}`;
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('musyrifPanel').style.display = 'block';
        renderJadwal();
        renderUser();
    }
}

function logout() { location.reload(); }

// ==================== ADMIN FUNCTIONS ====================
function renderAdmin() {
    const today = new Date().toDateString();
    const weekAgo = new Date(Date.now() - 7*86400000);
    const monthAgo = new Date(Date.now() - 30*86400000);
    
    let countHari = 0, countMinggu = 0, countBulan = 0;
    for (let d of allData) {
        const tgl = new Date(d.timestamp);
        if (tgl.toDateString() === today) countHari++;
        if (tgl >= weekAgo) countMinggu++;
        if (tgl >= monthAgo) countBulan++;
    }
    document.getElementById('statHari').innerHTML = countHari;
    document.getElementById('statMinggu').innerHTML = countMinggu;
    document.getElementById('statBulan').innerHTML = countBulan;
    
    // Performa
    let perfHtml = "";
    for (let a in MUSYRIF) {
        for (let n in MUSYRIF[a].pasar) {
            let cnt = 0;
            for (let d of allData) {
                if (d.nama === n && new Date(d.timestamp) >= weekAgo) cnt++;
            }
            let persen = Math.min(100, Math.round(cnt/7*100));
            let cls = persen >= 70 ? "badge-green" : (persen >= 50 ? "badge-orange" : "badge-red");
            perfHtml += `<div class="perf-item"><div><b>${n}</b><br><small>${MUSYRIF[a].nama}</small></div><span class="badge ${cls}">${persen}%</span></div>`;
        }
    }
    document.getElementById('performaList').innerHTML = perfHtml || "<p>Belum ada data</p>";
    
    // Tabel
    if (allData.length === 0) {
        document.getElementById('adminTableBody').innerHTML = '<tr><td colspan="5">Belum ada data</td></tr>';
    } else {
        let html = "";
        const sorted = [...allData].reverse();
        for (let d of sorted) {
            html += `<tr>
                <td>${new Date(d.timestamp).toLocaleString()}</td>
                <td>${d.nama}</td>
                <td>${d.kegiatan}</td>
                <td>${d.foto ? `<img src="${d.foto}" class="foto-thumb" onclick="showFoto('${d.foto}')">` : '-'}</td>
                <td><button onclick="hapusData('${d.timestamp}')" style="background:#d32f2f; color:white; border:none; padding:5px 10px; border-radius:20px;">Hapus</button></td>
            </tr>`;
        }
        document.getElementById('adminTableBody').innerHTML = html;
    }
}

function hapusData(timestamp) {
    if (confirm("Hapus data ini?")) {
        allData = allData.filter(d => d.timestamp !== timestamp);
        saveStorage();
        renderAdmin();
        showToast("Data dihapus!");
    }
}

function refreshData() {
    loadStorage();
    renderAdmin();
    showToast("Data direfresh!");
}

function sendWAReminder() {
    const today = new Date().toDateString();
    const belum = [];
    for (let a in MUSYRIF) {
        for (let n in MUSYRIF[a].pasar) {
            let sudah = false;
            for (let d of allData) {
                if (d.nama === n && new Date(d.timestamp).toDateString() === today) { sudah = true; break; }
            }
            if (!sudah) belum.push(n);
        }
    }
    if (belum.length === 0) showToast("Semua sudah absen!");
    else window.open(`https://wa.me/?text=${encodeURIComponent(`*PENGINGAT*\nBelum absen:\n${belum.join('\n')}`)}`);
}

// ==================== MUSYRIF FUNCTIONS ====================
function renderJadwal() {
    let html = "";
    for (let j of JADWAL) html += `<div class="schedule-item">⏰ ${j}</div>`;
    document.getElementById('jadwalList').innerHTML = html;
}

function renderUser() {
    const myData = allData.filter(d => d.nama === currentUser);
    const today = new Date().toDateString();
    const weekAgo = new Date(Date.now() - 7*86400000);
    const monthAgo = new Date(Date.now() - 30*86400000);
    
    const harian = myData.some(d => new Date(d.timestamp).toDateString() === today) ? 100 : 0;
    const mingguan = Math.min(100, Math.round(myData.filter(d => new Date(d.timestamp) >= weekAgo).length / 7 * 100));
    const bulanan = Math.min(100, Math.round(myData.filter(d => new Date(d.timestamp) >= monthAgo).length / 30 * 100));
    
    document.getElementById('myHarian').innerHTML = harian + "%";
    document.getElementById('myMingguan').innerHTML = mingguan + "%";
    document.getElementById('myBulanan').innerHTML = bulanan + "%";
    
    if (myData.length === 0) {
        document.getElementById('riwayatBody').innerHTML = '<tr><td colspan="3">Belum ada riwayat</td></tr>';
    } else {
        let html = "";
        const sorted = [...myData].reverse();
        for (let d of sorted) {
            html += `<tr>
                <td>${new Date(d.timestamp).toLocaleString()}</td>
                <td>${d.kegiatan}</td>
                <td>${d.foto ? `<img src="${d.foto}" class="foto-thumb" onclick="showFoto('${d.foto}')">` : '-'}</td>
            </tr>`;
        }
        document.getElementById('riwayatBody').innerHTML = html;
    }
}

// SUBMIT ABSENSI
document.getElementById('absensiForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const kegiatan = document.getElementById('kegiatanSelect').value;
    const fileFoto = document.getElementById('fotoInput').files[0];
    const catatan = document.getElementById('catatanInput').value;
    
    if (!kegiatan) { showToast("Pilih kegiatan!"); return; }
    if (!fileFoto) { showToast("Ambil foto!"); return; }
    
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = "MENGIRIM...";
    
    try {
        const fotoBase64 = await bacaFile(fileFoto);
        const newData = {
            timestamp: new Date().toISOString(),
            nama: currentUser,
            asrama: MUSYRIF[currentAsrama].nama,
            kamar: MUSYRIF[currentAsrama].kamar[currentUser],
            kegiatan: kegiatan,
            foto: fotoBase64,
            catatan: catatan
        };
        allData.push(newData);
        saveStorage();
        showToast("✅ Absensi berhasil disimpan!");
        document.getElementById('absensiForm').reset();
        renderUser();
    } catch(err) {
        showToast("❌ Gagal: " + err.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = "✅ KIRIM ABSENSI";
    }
});

function bacaFile(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
    });
}

function showFoto(src) {
    const modal = document.getElementById('modalFoto');
    const img = document.getElementById('modalImg');
    img.src = src;
    modal.classList.add('active');
}

function closeModal() {
    document.getElementById('modalFoto').classList.remove('active');
}

console.log("✅ Aplikasi siap! Data akan tersimpan di browser anda.");
</script>

</div>
</body>
</html>
