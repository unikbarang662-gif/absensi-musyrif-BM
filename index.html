<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi - SIMPLE</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f0f0; max-width: 500px; margin: 0 auto; }
        .box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; }
        button { width: 100%; padding: 12px; background: green; color: white; border: none; border-radius: 8px; font-size: 16px; margin-top: 10px; cursor: pointer; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
        .hapus { background: red; padding: 4px 8px; border-radius: 5px; color: white; cursor: pointer; }
        img { width: 35px; height: 35px; object-fit: cover; border-radius: 5px; }
        .tab { display: inline-block; width: 49%; text-align: center; padding: 10px; background: #ccc; border-radius: 10px; cursor: pointer; margin-bottom: 15px; }
        .active { background: green; color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="loginPage">
    <div class="box">
        <h3 style="text-align:center">📋 ABSENSI</h3>
        <div id="errorMsg" style="color:red; display:none; margin-bottom:10px;"></div>
        
        <div>
            <span class="tab active" onclick="pilihForm('musyrif')">MUSYRIF</span>
            <span class="tab" onclick="pilihForm('admin')">ADMIN</span>
        </div>
        
        <form id="formMusyrif">
            <select id="asrama">
                <option value="">-- Asrama --</option>
                <option value="alhakim">Al Hakim</option>
                <option value="alfattah">Al Fattah</option>
                <option value="alkarim">Al Karim</option>
            </select>
            <select id="namaMusyrif" disabled>
                <option value="">-- Pilih Asrama dulu --</option>
            </select>
            <input type="password" id="password" placeholder="Password">
            <button type="submit">MASUK</button>
        </form>
        
        <form id="formAdmin" class="hidden">
            <input type="password" id="pinAdmin" placeholder="PIN Admin">
            <button type="submit">MASUK ADMIN</button>
        </form>
    </div>
</div>

<div id="appPage" style="display:none">
    <div class="box" style="background: green; color: white;">
        <h3 id="titleApp">Dashboard</h3>
        <p id="userInfo" style="font-size:12px"></p>
        <button onclick="logout()" style="background: rgba(255,255,255,0.3); margin-top:5px;">KELUAR</button>
    </div>
    
    <div id="adminArea">
        <div class="box">
            <button onclick="refresh()">REFRESH DATA</button>
        </div>
        <div class="box">
            <h4>STATISTIK</h4>
            <p>Hari ini: <span id="statHari">0</span></p>
            <p>Minggu ini: <span id="statMinggu">0</span></p>
            <p>Bulan ini: <span id="statBulan">0</span></p>
        </div>
        <div class="box">
            <h4>SEMUA DATA</h4>
            <div style="overflow-x:auto">
                <table id="tabelData">
                    <thead><tr><th>Waktu</th><th>Nama</th><th>Kegiatan</th><th>Foto</th><th></th></tr></thead>
                    <tbody id="tbodyData"><tr><td colspan="5">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div id="userArea" class="hidden">
        <div class="box">
            <h4>STATUS SAYA</h4>
            <p>Harian: <span id="userHarian">0%</span></p>
            <p>Mingguan: <span id="userMingguan">0%</span></p>
            <p>Bulanan: <span id="userBulanan">0%</span></p>
        </div>
        
        <div class="box">
            <h4>FORM ABSENSI</h4>
            <select id="kegiatan">
                <option value="">-- Pilih --</option>
                <option value="Membangunkan Santri">Membangunkan Santri</option>
                <option value="Pengajian Subuh">Pengajian Subuh</option>
                <option value="Menggobraki Sekolah">Menggobraki Sekolah</option>
                <option value="Piket Kamar">Piket Kamar</option>
                <option value="Pendampingan Dalail">Pendampingan Dalail</option>
                <option value="Pendampingan Tawasulan">Pendampingan Tawasulan</option>
            </select>
            <input type="file" id="fotoAbsen" accept="image/*" capture="user">
            <textarea id="catatan" rows="2" placeholder="Catatan"></textarea>
            <button id="btnKirim" onclick="simpanAbsen()">KIRIM</button>
        </div>
        
        <div class="box">
            <h4>RIWAYAT SAYA</h4>
            <div style="overflow-x:auto">
                <table id="riwayatTable">
                    <thead><tr><th>Waktu</th><th>Kegiatan</th><th>Foto</th></tr></thead>
                    <tbody id="tbodyRiwayat"><tr><td colspan="3">Belum ada data</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="modalFoto" onclick="this.style.display='none'" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:1000; text-align:center; padding-top:20%">
    <img id="imgModal" style="max-width:90%; max-height:80%">
</div>

<script>
// ==================== DATA ====================
const KEY = "data_absenku";
const PIN_ADMIN = "1234";

const MUSYRIF = {
    alhakim: { nama: "Al Hakim", pass: { "Ali Mashuri":"ali123", "Ali Zahid":"zahid123", "Reva Dwi":"reva123", "Imam Syafi'i":"imam123" }, kamar: "Khondak,Uhud" },
    alfattah: { nama: "Al Fattah", pass: { "Fattahilah":"fattah123", "Brian":"brian123", "Babil":"babil123", "Fahmi":"fahmi123", "Wawan":"wawan123" }, kamar: "Quba,Mekkah" },
    alkarim: { nama: "Al Karim", pass: { "Bima Julian":"bima123", "Irfan":"irfan123", "Rizki":"rizki123" }, kamar: "101,102" }
};

let role = "", userSaatIni = "", asramaSaatIni = "", allData = [];

// LOAD DATA
function load() {
    let saved = localStorage.getItem(KEY);
    if (saved) {
        try { allData = JSON.parse(saved); } catch(e) { allData = []; }
    } else { allData = []; }
    console.log("Data:", allData.length);
}

function save() {
    localStorage.setItem(KEY, JSON.stringify(allData));
    console.log("Tersimpan:", allData.length);
}

// LOGIN
document.getElementById('asrama').onchange = function() {
    let a = this.value;
    let selectNama = document.getElementById('namaMusyrif');
    if (a && MUSYRIF[a]) {
        selectNama.disabled = false;
        selectNama.innerHTML = '<option value="">-- Pilih --</option>';
        for (let n in MUSYRIF[a].pass) {
            selectNama.innerHTML += `<option value="${n}">${n}</option>`;
        }
    } else {
        selectNama.disabled = true;
        selectNama.innerHTML = '<option value="">-- Pilih Asrama --</option>';
    }
};

function pilihForm(t) {
    let tabs = document.querySelectorAll('.tab');
    tabs.forEach(tab => tab.classList.remove('active'));
    if (t == 'admin') {
        tabs[1].classList.add('active');
        document.getElementById('formMusyrif').classList.add('hidden');
        document.getElementById('formAdmin').classList.remove('hidden');
    } else {
        tabs[0].classList.add('active');
        document.getElementById('formMusyrif').classList.remove('hidden');
        document.getElementById('formAdmin').classList.add('hidden');
    }
}

document.getElementById('formMusyrif').onsubmit = function(e) {
    e.preventDefault();
    let a = document.getElementById('asrama').value;
    let n = document.getElementById('namaMusyrif').value;
    let p = document.getElementById('password').value;
    
    if (MUSYRIF[a] && MUSYRIF[a].pass[n] == p) {
        role = "user";
        userSaatIni = n;
        asramaSaatIni = a;
        start();
    } else {
        document.getElementById('errorMsg').innerHTML = "Password salah!";
        document.getElementById('errorMsg').style.display = 'block';
        setTimeout(() => document.getElementById('errorMsg').style.display = 'none', 2000);
    }
};

document.getElementById('formAdmin').onsubmit = function(e) {
    e.preventDefault();
    let pin = document.getElementById('pinAdmin').value;
    if (pin == PIN_ADMIN) {
        role = "admin";
        start();
    } else {
        document.getElementById('errorMsg').innerHTML = "PIN salah!";
        document.getElementById('errorMsg').style.display = 'block';
        setTimeout(() => document.getElementById('errorMsg').style.display = 'none', 2000);
    }
};

function start() {
    load();
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('appPage').style.display = 'block';
    
    if (role == "admin") {
        document.getElementById('titleApp').innerHTML = "ADMIN";
        document.getElementById('userInfo').innerHTML = "Administrator";
        document.getElementById('adminArea').style.display = 'block';
        document.getElementById('userArea').classList.add('hidden');
        renderAdmin();
    } else {
        document.getElementById('titleApp').innerHTML = "ABSENSI";
        document.getElementById('userInfo').innerHTML = userSaatIni + " | " + MUSYRIF[asramaSaatIni].nama;
        document.getElementById('adminArea').style.display = 'none';
        document.getElementById('userArea').classList.remove('hidden');
        renderUser();
    }
}

function logout() { location.reload(); }

// ADMIN
function renderAdmin() {
    let today = new Date().toDateString();
    let weekAgo = new Date(Date.now() - 7*86400000);
    let monthAgo = new Date(Date.now() - 30*86400000);
    let h=0, m=0, b=0;
    
    for (let d of allData) {
        let tgl = new Date(d.timestamp);
        if (tgl.toDateString() == today) h++;
        if (tgl >= weekAgo) m++;
        if (tgl >= monthAgo) b++;
    }
    document.getElementById('statHari').innerHTML = h;
    document.getElementById('statMinggu').innerHTML = m;
    document.getElementById('statBulan').innerHTML = b;
    
    if (allData.length == 0) {
        document.getElementById('tbodyData').innerHTML = '<tr><td colspan="5">Belum ada data</td></tr>';
        return;
    }
    
    let html = "";
    let sorted = [...allData].reverse();
    for (let d of sorted) {
        html += `<tr>
            <td>${new Date(d.timestamp).toLocaleString()}</td>
            <td>${d.nama}</td>
            <td>${d.kegiatan}</td>
            <td>${d.foto ? `<img src="${d.foto}" onclick="lihatFoto('${d.foto}')">` : '-'}</td>
            <td><span class="hapus" onclick="hapusData('${d.timestamp}')">Hapus</span></td>
        </tr>`;
    }
    document.getElementById('tbodyData').innerHTML = html;
}

function hapusData(ts) {
    if (confirm("Hapus?")) {
        allData = allData.filter(d => d.timestamp != ts);
        save();
        renderAdmin();
        alert("Data dihapus!");
    }
}

function refresh() {
    load();
    renderAdmin();
    alert("Data direfresh!");
}

// USER
function renderUser() {
    let myData = allData.filter(d => d.nama == userSaatIni);
    let today = new Date().toDateString();
    let weekAgo = new Date(Date.now() - 7*86400000);
    let monthAgo = new Date(Date.now() - 30*86400000);
    
    let h = myData.some(d => new Date(d.timestamp).toDateString() == today) ? 100 : 0;
    let m = Math.min(100, Math.round(myData.filter(d => new Date(d.timestamp) >= weekAgo).length / 7 * 100));
    let b = Math.min(100, Math.round(myData.filter(d => new Date(d.timestamp) >= monthAgo).length / 30 * 100));
    
    document.getElementById('userHarian').innerHTML = h + "%";
    document.getElementById('userMingguan').innerHTML = m + "%";
    document.getElementById('userBulanan').innerHTML = b + "%";
    
    if (myData.length == 0) {
        document.getElementById('tbodyRiwayat').innerHTML = '<tr><td colspan="3">Belum ada data</td></tr>';
        return;
    }
    
    let html = "";
    let sorted = [...myData].reverse();
    for (let d of sorted) {
        html += `<tr>
            <td>${new Date(d.timestamp).toLocaleString()}</td>
            <td>${d.kegiatan}</td>
            <td>${d.foto ? `<img src="${d.foto}" onclick="lihatFoto('${d.foto}')">` : '-'}</td>
        </tr>`;
    }
    document.getElementById('tbodyRiwayat').innerHTML = html;
}

// SIMPAN ABSEN
async function simpanAbsen() {
    let kegiatan = document.getElementById('kegiatan').value;
    let fileFoto = document.getElementById('fotoAbsen').files[0];
    let catatan = document.getElementById('catatan').value;
    
    if (!kegiatan) { alert("Pilih kegiatan!"); return; }
    if (!fileFoto) { alert("Ambil foto!"); return; }
    
    let btn = document.getElementById('btnKirim');
    btn.disabled = true;
    btn.innerHTML = "MENYIMPAN...";
    
    try {
        let fotoBase64 = await bacaFile(fileFoto);
        let dataBaru = {
            timestamp: new Date().toISOString(),
            nama: userSaatIni,
            asrama: MUSYRIF[asramaSaatIni].nama,
            kegiatan: kegiatan,
            foto: fotoBase64,
            catatan: catatan
        };
        allData.push(dataBaru);
        save();
        alert("✅ BERHASIL DISIMPAN!");
        document.getElementById('kegiatan').value = "";
        document.getElementById('fotoAbsen').value = "";
        document.getElementById('catatan').value = "";
        renderUser();
    } catch(err) {
        alert("❌ Gagal: " + err.message);
    } finally {
        btn.disabled = false;
        btn.innerHTML = "KIRIM";
    }
}

function bacaFile(file) {
    return new Promise((resolve, reject) => {
        let reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
    });
}

function lihatFoto(src) {
    document.getElementById('imgModal').src = src;
    document.getElementById('modalFoto').style.display = 'block';
}

console.log("APLIKASI SIAP!");
</script>
</body>
</html>
