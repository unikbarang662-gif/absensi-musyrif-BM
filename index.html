<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Musyrif - Laporan PDF</title>
    
    <!-- CSS Tampilan (Tidak diubah, sesuai asli) -->
    <style>
        body { font-family: sans-serif; background-color: #f9f9f9; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 14px; }
        th { background-color: #f4f4f4; }
        img.preview { max-width: 50px; max-height: 50px; object-fit: cover; border-radius: 4px; }
        .hidden { display: none; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; }
        button { cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #218838; }
        .btn-danger { background-color: #dc3545; }
        .btn-danger:hover { background-color: #c82333; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #e9ecef; padding: 10px; text-align: center; border-radius: 5px; }
        .stat-val { font-size: 20px; font-weight: bold; }
    </style>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <!-- BAGIAN LOGIN -->
    <div id="login-view" class="container">
        <h2>📋 Absensi Musyrif</h2>
        <p>Pilih akses masuk:</p>
        <button onclick="setRole('musyrif')">👤 Musyrif</button>
        <button onclick="setRole('admin')">🛡️ Admin</button>

        <div id="form-login" class="hidden">
            <h3 id="login-title">Login</h3>
            
            <label>Asrama:</label>
            <select id="asrama">
                <option value="">-- Pilih Asrama --</option>
                <option value="Asrama Al Hakim">Asrama Al Hakim</option>
                <option value="Asrama Al Fattah">Asrama Al Fattah</option>
                <option value="Asrama Al Karim">Asrama Al Karim</option>
            </select>

            <label>Nama Musyrif:</label>
            <select id="nama-musyrif">
                <option value="">-- Pilih Asrama Terlebih Dahulu --</option>
                <!-- Opsi nama akan diisi dinamis atau manual -->
            </select>
            
            <label>Password / PIN:</label>
            <input type="password" id="password" placeholder="Masukkan password">
            
            <button onclick="doLogin()">🔐 Masuk</button>
            <p id="error-msg" style="color:red; display:none;"></p>
        </div>
    </div>

    <!-- BAGIAN DASHBOARD -->
    <div id="dashboard-view" class="container hidden">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Dashboard (<span id="user-display"></span>)</h3>
            <button onclick="logout()" style="width:auto; background:#6c757d;">Keluar</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div>Hari Ini</div><div class="stat-val" id="stat-hari">0</div></div>
            <div class="stat-card"><div>Minggu Ini</div><div class="stat-val" id="stat-minggu">0</div></div>
            <div class="stat-card"><div>Bulan Ini</div><div class="stat-val" id="stat-bulan">0</div></div>
            <div class="stat-card"><div>Aktif</div><div class="stat-val" id="stat-aktif">0/12</div></div>
        </div>

        <!-- INPUT ABSENSI -->
        <div id="input-section">
            <h3>📝 Input Absensi</h3>
            <label>Kegiatan:</label>
            <select id="kegiatan">
                <option value="">-- Pilih Kegiatan --</option>
                <option value="Sholat Subuh">Sholat Subuh</option>
                <option value="Sholat Dzuhur">Sholat Dzuhur</option>
                <option value="Sholat Ashar">Sholat Ashar</option>
                <option value="Sholat Maghrib">Sholat Maghrib</option>
                <option value="Sholat Isya">Sholat Isya</option>
                <option value="Kajian Pagi">Kajian Pagi</option>
                <option value="Kajian Malam">Kajian Malam</option>
                <option value="Piket Kebersihan">Piket Kebersihan</option>
            </select>

            <label>Foto Kegiatan:</label>
            <input type="file" id="foto" accept="image/*" capture="environment">
            
            <label>Catatan:</label>
            <input type="text" id="catatan" placeholder="Keterangan tambahan...">

            <button onclick="simpanAbsensi()" id="btn-submit">✅ Kirim Absensi</button>
        </div>

        <hr>

        <!-- TABEL DATA -->
        <div style="display:flex; justify-content:space-between; margin-top:20px;">
            <h3>📜 Semua Data Absensi</h3>
            <button onclick="refreshData()" style="width:auto;">🔄 Refresh Data</button>
        </div>
        
        <div style="overflow-x:auto;">
            <table id="tabel-absensi">
                <thead>
                    <tr>
                        <th>Waktu</th>
                        <th>Nama</th>
                        <th>Asrama</th>
                        <th>Kegiatan</th>
                        <th>Foto</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tbody-absensi">
                    <tr><td colspan="6" style="text-align:center;">Loading data...</td></tr>
                </tbody>
            </table>
        </div>
        
        <button onclick="cetakLaporan()" style="margin-top:20px; background:#007bff;">📄 Cetak Laporan PDF</button>
    </div>

    <!-- LOGIKA JAVASCRIPT -->
    <script>
        // ==========================================
        // KONFIGURASI FIREBASE (SUDAH TERISI OTOMATIS)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAJTPkEkj5uBX6c13Hpvx7NWkSNugzmFNU",
            authDomain: "absensi-musyrif-bm.firebaseapp.com",
            projectId: "absensi-musyrif-bm",
            storageBucket: "absensi-musyrif-bm.appspot.com",
            messagingSenderId: "968312390099",
            appId: "1:968312390099:web:d6ffcef5d50a0b4b63af26"
        };

        // Inisialisasi
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Variabel Global
        let currentUser = null;
        let userRole = 'musyrif';

        // --- FUNGSI LOGIN ---
        function setRole(role) {
            userRole = role;
            document.getElementById('form-login').classList.remove('hidden');
            document.getElementById('login-title').innerText = role === 'admin' ? " Login Admin" : " Login Musyrif";
        }

        // Update dropdown nama berdasarkan asrama
        document.getElementById('asrama').addEventListener('change', function() {
            const selectNama = document.getElementById('nama-musyrif');
            selectNama.innerHTML = '<option value="">-- Pilih Nama --</option>';
            if(this.value) {
                // Contoh data dummy nama (bisa disesuaikan)
                const namaList = ['Musyrif A', 'Musyrif B', 'Musyrif C', 'Ustadz D', 'Ustadz E']; 
                namaList.forEach(n => {
                    let opt = document.createElement('option');
                    opt.value = n;
                    opt.innerText = n;
                    selectNama.appendChild(opt);
                });
            }
        });

        function doLogin() {
            const asrama = document.getElementById('asrama').value;
            const nama = document.getElementById('nama-musyrif').value;
            const pass = document.getElementById('password').value;

            if (!asrama) return alert('Pilih asrama dulu!');
            
            // Validasi sederhana (Password bisa diganti sesuai keinginan)
            if (userRole === 'admin' && pass !== 'admin123') return alert('PIN Admin salah!');
            if (userRole === 'musyrif' && (!nama || !pass)) return alert('Lengkapi data!');

            currentUser = {
                nama: userRole === 'admin' ? 'Admin' : nama,
                asrama: asrama,
                role: userRole
            };

            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('user-display').innerText = currentUser.nama;
            
            // Hide input section jika admin
            if(currentUser.role === 'admin') {
                document.getElementById('input-section').classList.add('hidden');
            } else {
                document.getElementById('input-section').classList.remove('hidden');
            }

            refreshData();
        }

        function logout() {
            location.reload();
        }

        // --- FUNGSI SIMPAN DATA (CLOUD) ---
        async function simpanAbsensi() {
            const kegiatan = document.getElementById('kegiatan').value;
            const fotoInput = document.getElementById('foto');
            const catatan = document.getElementById('catatan').value;
            const btn = document.getElementById('btn-submit');

            if (!kegiatan) return alert('Pilih kegiatan!');

            btn.innerText = "⏳ Menyimpan...";
            btn.disabled = true;

            let fotoBase64 = "";
            if (fotoInput.files.length > 0) {
                fotoBase64 = await toBase64(fotoInput.files[0]);
            }

            try {
                await db.collection('absensi_musyrif').add({
                    nama: currentUser.nama,
                    asrama: currentUser.asrama,
                    kegiatan: kegiatan,
                    catatan: catatan,
                    foto: fotoBase64,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp() // Waktu server
                });
                alert('✅ Data tersimpan!');
                document.getElementById('kegiatan').value = "";
                document.getElementById('catatan').value = "";
                document.getElementById('foto').value = "";
                refreshData();
            } catch (e) {
                alert('❌ Error: ' + e.message);
            } finally {
                btn.innerText = "✅ Kirim Absensi";
                btn.disabled = false;
            }
        }

        // Helper gambar ke base64
        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        // --- FUNGSI TAMPILKAN DATA (REALTIME) ---
        function refreshData() {
            db.collection('absensi_musyrif')
              .orderBy('timestamp', 'desc')
              .get()
              .then(snapshot => {
                  const tbody = document.getElementById('tbody-absensi');
                  tbody.innerHTML = '';
                  
                  let countHari = 0;
                  let countMinggu = 0;
                  let countBulan = 0;
                  const uniqueUsers = new Set();
                  const now = new Date();

                  snapshot.forEach(doc => {
                      const data = doc.data();
                      const date = data.timestamp ? data.timestamp.toDate() : new Date();
                      
                      // Hitung Statistik
                      uniqueUsers.add(data.nama);
                      const diffTime = Math.abs(now - date);
                      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                      
                      if (diffDays <= 1) countHari++;
                      if (diffDays <= 7) countMinggu++;
                      if (diffDays <= 30) countBulan++;

                      // Render Tabel
                      const tr = document.createElement('tr');
                      tr.innerHTML = `
                          <td>${date.toLocaleString()}</td>
                          <td>${data.nama}</td>
                          <td>${data.asrama}</td>
                          <td>${data.kegiatan}</td>
                          <td>${data.foto ? `<img src="${data.foto}" class="preview">` : '-'}</td>
                          <td>${currentUser.role === 'admin' ? `<button class="btn-danger" onclick="hapusData('${doc.id}')" style="padding:5px;">️</button>` : '-'}</td>
                      `;
                      tbody.appendChild(tr);
                  });

                  // Update Statistik UI
                  document.getElementById('stat-hari').innerText = countHari;
                  document.getElementById('stat-minggu').innerText = countMinggu;
                  document.getElementById('stat-bulan').innerText = countBulan;
                  document.getElementById('stat-aktif').innerText = `${uniqueUsers.size}/12`;
              })
              .catch(err => console.log("Error load data:", err));
        }

        // --- FUNGSI HAPUS DATA ---
        function hapusData(id) {
            if(confirm('Yakin hapus data ini?')) {
                db.collection('absensi_musyrif').doc(id).delete().then(() => {
                    refreshData();
                });
            }
        }
        
        // Fitur dummy cetak
        function cetakLaporan() {
            alert("Fitur cetak PDF akan membuka jendela print browser...");
            window.print();
        }
    </script>
</body>
</html>
